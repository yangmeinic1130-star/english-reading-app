<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日英语阅读</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
/* 基础样式重置 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    /* 暖色调配色 */
    --primary-color: #E8A87C;
    --primary-dark: #D4956A;
    --secondary-color: #C38D9E;
    --accent-color: #41B3A3;
    --background-color: #FFF8F0;
    --card-bg: #FFFFFF;
    --text-primary: #4A4A4A;
    --text-secondary: #7A7A7A;
    --text-light: #A0A0A0;
    --border-color: #F0E6DA;
    --success-color: #7CB342;
    --error-color: #E57373;
    --shadow: 0 2px 12px rgba(232, 168, 124, 0.15);
}

body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: var(--background-color);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
}

#app {
    max-width: 100%;
    min-height: 100vh;
}

/* 页面切换 */
.page {
    display: none;
    min-height: 100vh;
    padding-bottom: 20px;
}

.page.active {
    display: block;
}

/* 头部样式 */
.header {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    padding: 30px 20px 25px;
    text-align: center;
    border-radius: 0 0 30px 30px;
    box-shadow: var(--shadow);
}

.header h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 5px;
}

.header .subtitle {
    font-size: 14px;
    opacity: 0.9;
}

.detail-header {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    gap: 15px;
}

.detail-header h1 {
    font-size: 18px;
    flex: 1;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.back-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
}

.back-btn:active {
    background: rgba(255, 255, 255, 0.3);
}

/* 标签栏 */
.tab-bar {
    display: flex;
    background: var(--card-bg);
    margin: -15px 20px 15px;
    border-radius: 25px;
    padding: 5px;
    box-shadow: var(--shadow);
}

.tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 500;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.tab-btn.active {
    background: var(--primary-color);
    color: white;
}

/* 容器 */
.container {
    padding: 0 20px;
}

.hidden {
    display: none !important;
}

/* 文章列表 */
.articles-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.article-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.article-card:active {
    transform: scale(0.98);
    box-shadow: 0 1px 8px rgba(232, 168, 124, 0.2);
}

.article-card .category-tag {
    display: inline-block;
    background: var(--primary-color);
    color: white;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.article-card h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-primary);
    line-height: 1.4;
}

.article-card .preview {
    font-size: 13px;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
}

.article-card .meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-light);
}

/* 文章详情页 */
.article-meta {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    font-size: 13px;
}

.article-meta .category {
    background: var(--primary-color);
    color: white;
    padding: 3px 12px;
    border-radius: 12px;
}

.article-meta .date {
    color: var(--text-light);
    padding: 3px 0;
}

/* 音频播放器 */
.audio-player {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
}

.play-btn {
    background: var(--primary-color);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.3s ease;
}

.play-btn:active {
    background: var(--primary-dark);
}

.play-btn.playing {
    background: var(--secondary-color);
}

.progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border-color);
    border-radius: 3px;
    overflow: hidden;
}

.progress {
    height: 100%;
    background: var(--primary-color);
    width: 0%;
    transition: width 0.1s linear;
}

.audio-player .time {
    font-size: 12px;
    color: var(--text-light);
    min-width: 40px;
}

/* 文章内容 */
.article-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    font-size: 16px;
    line-height: 1.8;
}

.article-content p {
    margin-bottom: 15px;
}

.article-content p:last-child {
    margin-bottom: 0;
}

.article-content .highlight-word {
    color: var(--primary-dark);
    font-weight: 500;
    cursor: pointer;
    border-bottom: 1px dashed var(--primary-color);
}

/* 翻译区域 */
.translation-section {
    margin-bottom: 20px;
}

.toggle-btn {
    width: 100%;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    color: var(--text-primary);
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.toggle-btn:active {
    background: var(--border-color);
}

.toggle-btn.active {
    border-color: var(--primary-color);
    color: var(--primary-dark);
}

.translation-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-top: 15px;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-secondary);
    box-shadow: var(--shadow);
}

/* 区块样式 */
.section {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
}

.section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 15px;
    color: var(--text-primary);
}

/* 单词列表 */
.words-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.word-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    background: var(--background-color);
    border-radius: 12px;
}

.word-item .word-info {
    flex: 1;
}

.word-item .word {
    font-size: 16px;
    font-weight: 600;
    color: var(--primary-dark);
}

.word-item .phonetic {
    font-size: 12px;
    color: var(--text-light);
    margin-left: 8px;
}

.word-item .meaning {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
}

.word-item .add-btn {
    background: transparent;
    border: 1px solid var(--primary-color);
    color: var(--primary-color);
    padding: 6px 12px;
    border-radius: 15px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.word-item .add-btn:active {
    background: var(--primary-color);
    color: white;
}

.word-item .add-btn.added {
    background: var(--success-color);
    border-color: var(--success-color);
    color: white;
}

/* 句型列表 */
.sentences-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.sentence-item {
    padding: 15px;
    background: var(--background-color);
    border-radius: 12px;
}

.sentence-item .english {
    font-size: 15px;
    color: var(--text-primary);
    margin-bottom: 8px;
    font-style: italic;
}

.sentence-item .chinese {
    font-size: 13px;
    color: var(--text-secondary);
}

.sentence-item .explanation {
    font-size: 12px;
    color: var(--accent-color);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border-color);
}

/* 题目列表 */
.questions-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.question-item {
    padding: 15px;
    background: var(--background-color);
    border-radius: 12px;
}

.question-item .question-text {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
}

.question-item .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.question-item .option {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    background: var(--card-bg);
    border: 2px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.question-item .option:active {
    background: var(--border-color);
}

.question-item .option.selected {
    border-color: var(--primary-color);
    background: rgba(232, 168, 124, 0.1);
}

.question-item .option.correct {
    border-color: var(--success-color);
    background: rgba(124, 179, 66, 0.1);
}

.question-item .option.wrong {
    border-color: var(--error-color);
    background: rgba(229, 115, 115, 0.1);
}

.question-item .option-label {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 24px;
    height: 24px;
    background: var(--border-color);
    border-radius: 50%;
    font-size: 12px;
    font-weight: 600;
    margin-right: 10px;
}

.option.selected .option-label {
    background: var(--primary-color);
    color: white;
}

.option.correct .option-label {
    background: var(--success-color);
    color: white;
}

.option.wrong .option-label {
    background: var(--error-color);
    color: white;
}

.submit-btn {
    width: 100%;
    background: var(--primary-color);
    border: none;
    color: white;
    padding: 14px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.3s ease;
}

.submit-btn:active {
    background: var(--primary-dark);
}

.result {
    text-align: center;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    font-size: 15px;
}

.result.success {
    background: rgba(124, 179, 66, 0.1);
    color: var(--success-color);
}

.result.partial {
    background: rgba(232, 168, 124, 0.1);
    color: var(--primary-dark);
}

/* 单词本 */
.vocabulary-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.vocabulary-item {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 15px;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.vocabulary-item .word-info {
    flex: 1;
}

.vocabulary-item .word {
    font-size: 18px;
    font-weight: 600;
    color: var(--primary-dark);
}

.vocabulary-item .phonetic {
    font-size: 12px;
    color: var(--text-light);
    margin-left: 8px;
}

.vocabulary-item .meaning {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 4px;
}

.vocabulary-item .delete-btn {
    background: transparent;
    border: none;
    color: var(--error-color);
    font-size: 20px;
    cursor: pointer;
    padding: 5px 10px;
}

.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
}

.empty-state .icon {
    font-size: 50px;
    margin-bottom: 15px;
}

.empty-state p {
    font-size: 14px;
}

/* 弹窗 */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 20px;
}

.modal-content {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 25px;
    width: 100%;
    max-width: 350px;
    position: relative;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: transparent;
    border: none;
    font-size: 24px;
    color: var(--text-light);
    cursor: pointer;
}

.word-detail .word {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 5px;
}

.word-detail .phonetic {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 15px;
}

.word-detail .meaning {
    font-size: 16px;
    color: var(--text-primary);
    margin-bottom: 15px;
    line-height: 1.6;
}

.word-detail .example {
    background: var(--background-color);
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 15px;
}

.word-detail .example strong {
    color: var(--primary-dark);
}

.add-word-btn {
    width: 100%;
    background: var(--primary-color);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 20px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.3s ease;
}

.add-word-btn:active {
    background: var(--primary-dark);
}

.add-word-btn.added {
    background: var(--success-color);
}

/* 提示消息 */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.8);
    color: white;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 14px;
    z-index: 1001;
    transition: opacity 0.3s ease;
}

/* 响应式调整 */
@media (min-width: 768px) {
    .header {
        padding: 40px 20px 35px;
    }
    
    .header h1 {
        font-size: 28px;
    }
    
    .container {
        max-width: 600px;
        margin: 0 auto;
    }
    
    .article-content {
        font-size: 17px;
    }
}

/* 动画 */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.article-card, .vocabulary-item {
    animation: fadeIn 0.3s ease;
}

/* 获取新文章按钮 */
.refresh-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
    border: none;
    color: white;
    padding: 14px 20px;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
}

.refresh-btn:active {
    transform: scale(0.98);
}

.refresh-btn .refresh-icon {
    font-size: 18px;
}

.refresh-btn.loading .refresh-icon {
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* 书籍列表 */
.books-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.book-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    gap: 15px;
}

.book-card:active {
    transform: scale(0.98);
}

.book-card .cover {
    width: 70px;
    height: 95px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
}

.book-card .info {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.book-card h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--text-primary);
    line-height: 1.3;
}

.book-card .author {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 6px;
}

.book-card .level {
    display: inline-block;
    background: var(--border-color);
    color: var(--text-secondary);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    width: fit-content;
}

.book-card .desc {
    font-size: 12px;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
}

/* 书籍详情页 */
.book-info-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 15px;
}

.book-info-card .book-cover {
    width: 80px;
    height: 110px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
}

.book-meta-info {
    flex: 1;
}

.book-meta-info h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--text-primary);
}

.book-meta-info .book-author {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 8px;
}

.book-meta-info .book-level {
    display: inline-block;
    background: var(--primary-color);
    color: white;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 8px;
}

.book-meta-info .book-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
}

/* 章节列表 */
.chapters-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.chapter-item {
    background: var(--background-color);
    padding: 14px 16px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.2s ease;
}

.chapter-item:active {
    background: var(--border-color);
}

.chapter-item .chapter-num {
    font-size: 12px;
    color: var(--text-light);
    margin-right: 10px;
}

.chapter-item .chapter-name {
    flex: 1;
    font-size: 14px;
    color: var(--text-primary);
}

.chapter-item .chapter-arrow {
    color: var(--text-light);
    font-size: 14px;
}

/* 章节内容 */
.chapter-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    font-size: 16px;
    line-height: 1.9;
}

.chapter-content p {
    margin-bottom: 18px;
    text-indent: 2em;
}

.chapter-content p:last-child {
    margin-bottom: 0;
}

.chapter-content .highlight-word {
    color: var(--primary-dark);
    font-weight: 500;
    cursor: pointer;
    border-bottom: 1px dashed var(--primary-color);
}

/* 章节导航 */
.chapter-nav {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.nav-btn {
    flex: 1;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    color: var(--text-primary);
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.nav-btn:active {
    background: var(--border-color);
}

.nav-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* 新文章提示 */
.new-article-badge {
    display: inline-block;
    background: var(--error-color);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 8px;
    margin-left: 8px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}
    </style>
</head>
<body>
    <div id="app">
        <!-- 主页/文章列表 -->
        <div id="home-page" class="page active">
            <header class="header">
                <h1>每日英语阅读</h1>

function renderArticlesList() {
    articlesList.innerHTML = articles.map((article, index) => `
        <div class="article-card" data-id="${article.id}" style="animation-delay: ${index * 0.1}s">
            <span class="category-tag">${article.category}</span>
            ${article.isNew ? '<span class="new-article-badge">NEW</span>' : ''}

            <p class="preview">${getPreview(article.content)}</p>
            <div class="meta">

                <span>${article.words.length} 个重点单词</span>

        </div>

}

                <h3 style="font-size: 14px; font-weight: 400; margin-bottom: 5px;">${book.titleZh}</h3>
                <p class="author">${book.author}</p>
                <span class="level">${book.level}</span>
                <p class="desc">${book.description}</p>
            </div>
        </div>
    `).join('');
}

// 获取新文章
function fetchNewArticles() {
    const btn = document.getElementById('refresh-articles');
    btn.classList.add('loading');
    btn.disabled = true;
    
    // 模拟加载
    setTimeout(() => {
        // 检查是否已经添加过
        if (!newArticlesAdded) {
            // 添加新文章到列表开头
            newArticlesPool.forEach(article => {
                article.isNew = true;
                articles.unshift(article);
            });
            newArticlesAdded = true;
        }
        
        renderArticlesList();
        btn.classList.remove('loading');
        btn.disabled = false;
        showToast('已获取 ' + newArticlesPool.length + ' 篇新文章！');
    }, 1500);
}

// 获取文章预览
function getPreview(content) {
    const temp = document.createElement('div');
    temp.innerHTML = content;
    const text = temp.textContent || temp.innerText;
    return text.substring(0, 80) + '...';
}

// 渲染单词本
function renderVocabularyList() {
    if (vocabularyList.length === 0) {
        vocabularyListEl.innerHTML = `
            <div class="empty-state">
                <div class="icon">📚</div>
                <p>单词本是空的<br>阅读文章时可以添加单词哦</p>
            </div>
        `;
        return;
    }
    
    vocabularyListEl.innerHTML = vocabularyList.map((item, index) => `
        <div class="vocabulary-item" style="animation-delay: ${index * 0.05}s">
            <div class="word-info">
                <div>
                    <span class="word">${item.word}</span>
                    <span class="phonetic">${item.phonetic}</span>
                </div>
                <div class="meaning">${item.meaning}</div>
            </div>
            <button class="delete-btn" data-word="${item.word}">×</button>
        </div>
    `).join('');
}

// 设置事件监听
function setupEventListeners() {
    // 获取新文章按钮
    document.getElementById('refresh-articles').addEventListener('click', fetchNewArticles);
    
    // 文章卡片点击
    articlesList.addEventListener('click', (e) => {
        const card = e.target.closest('.article-card');
        if (card) {
            const id = parseInt(card.dataset.id);
            openArticle(id);
        }
    });
    
    // 书籍卡片点击
    booksList.addEventListener('click', (e) => {
        const card = e.target.closest('.book-card');
        if (card) {
            const id = parseInt(card.dataset.id);
            openBook(id);
        }
    });
    
    // 返回按钮
    document.getElementById('back-btn').addEventListener('click', goBack);
    document.getElementById('back-from-chapters').addEventListener('click', () => {
        bookChaptersPage.classList.remove('active');
        homePage.classList.add('active');
    });
    document.getElementById('back-from-chapter').addEventListener('click', () => {
        chapterPage.classList.remove('active');
        bookChaptersPage.classList.add('active');
    });
    
    // 章节导航
    document.getElementById('prev-chapter').addEventListener('click', navigateChapter.bind(null, -1));
    document.getElementById('next-chapter').addEventListener('click', navigateChapter.bind(null, 1));
    
    // 标签切换
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            switchTab(tab);
        });
    });
    
    // 单词本删除
    vocabularyListEl.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) {
            const word = e.target.dataset.word;
            removeFromVocabulary(word);
        }
    });
    
    // 翻译切换
    document.getElementById('toggle-translation').addEventListener('click', toggleTranslation);
    
    // 播放按钮
    document.getElementById('play-btn').addEventListener('click', toggleAudio);
    
    // 提交答案
    document.getElementById('submit-answers').addEventListener('click', submitAnswers);
    
    // 关闭弹窗
    document.getElementById('close-modal').addEventListener('click', () => {
        wordModal.classList.add('hidden');
    });
    
    // 添加单词按钮
    document.getElementById('add-word-btn').addEventListener('click', addWordFromModal);
    
    // 点击弹窗外部关闭
    wordModal.addEventListener('click', (e) => {
        if (e.target === wordModal) {
            wordModal.classList.add('hidden');
        }
    });
    
    // 文章内容中的高亮单词点击
    document.getElementById('article-content').addEventListener('click', (e) => {
        if (e.target.classList.contains('highlight-word')) {
            const word = e.target.dataset.word;
            showWordModal(word);
        }
    });
    
    // 章节内容中的高亮单词点击
    document.getElementById('chapter-content').addEventListener('click', (e) => {
        if (e.target.classList.contains('highlight-word')) {
            const word = e.target.dataset.word;
            showChapterWordModal(word);
        }
    });
}

// 打开文章详情
function openArticle(id) {
    currentArticleId = id;
    const article = articles.find(a => a.id === id);
    if (!article) return;
    
    // 重置状态
    selectedAnswers = {};
    document.getElementById('translation-content').classList.add('hidden');
    document.getElementById('toggle-translation').classList.remove('active');
    document.getElementById('quiz-result').classList.add('hidden');
    resetAudio();
    
    // 填充内容
    document.getElementById('detail-title').textContent = article.title;
    document.getElementById('detail-category').textContent = article.category;
    document.getElementById('detail-date').textContent = article.date;
    document.getElementById('article-content').innerHTML = article.content;
    document.getElementById('translation-content').innerHTML = article.translation;
    
    // 渲染单词
    renderWords(article.words);
    
    // 渲染句型
    renderSentences(article.sentences);
    
    // 渲染题目
    renderQuestions(article.questions);
    
    // 切换页面
    homePage.classList.remove('active');
    detailPage.classList.add('active');
    window.scrollTo(0, 0);
}

// 渲染单词
function renderWords(words) {
    const wordsList = document.getElementById('words-list');
    wordsList.innerHTML = words.map(w => {
        const isAdded = vocabularyList.some(v => v.word === w.word);
        return `
            <div class="word-item">
                <div class="word-info">
                    <div>
                        <span class="word">${w.word}</span>
                        <span class="phonetic">${w.phonetic}</span>
                    </div>
                    <div class="meaning">${w.meaning}</div>
                </div>
                <button class="add-btn ${isAdded ? 'added' : ''}" data-word="${w.word}" data-phonetic="${w.phonetic}" data-meaning="${w.meaning}">
                    ${isAdded ? '已添加' : '添加'}
                </button>
            </div>
        `;
    }).join('');
    
    // 添加单词按钮事件
    wordsList.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (!btn.classList.contains('added')) {
                const wordData = {
                    word: btn.dataset.word,
                    phonetic: btn.dataset.phonetic,
                    meaning: btn.dataset.meaning
                };
                addToVocabulary(wordData);
                btn.classList.add('added');
                btn.textContent = '已添加';
            }
        });
    });
}

// 渲染句型
function renderSentences(sentences) {
    const sentencesList = document.getElementById('sentences-list');
    sentencesList.innerHTML = sentences.map(s => `
        <div class="sentence-item">
            <div class="english">${s.english}</div>
            <div class="chinese">${s.chinese}</div>
            <div class="explanation">💡 ${s.explanation}</div>
        </div>
    `).join('');
}

// 渲染题目
function renderQuestions(questions) {
    const questionsList = document.getElementById('questions-list');
    questionsList.innerHTML = questions.map((q, qIndex) => `
        <div class="question-item">
            <div class="question-text">${qIndex + 1}. ${q.question}</div>
            <div class="options">
                ${q.options.map((opt, oIndex) => `
                    <div class="option" data-question="${qIndex}" data-option="${oIndex}">
                        <span class="option-label">${String.fromCharCode(65 + oIndex)}</span>
                        <span>${opt}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
    
    // 选项点击事件
    questionsList.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', () => {
            const qIndex = opt.dataset.question;
            const oIndex = parseInt(opt.dataset.option);
            
            // 移除同题其他选项的选中状态
            questionsList.querySelectorAll(`.option[data-question="${qIndex}"]`).forEach(o => {
                o.classList.remove('selected');
            });
            
            // 添加选中状态
            opt.classList.add('selected');
            selectedAnswers[qIndex] = oIndex;
        });
    });
}

// 提交答案
function submitAnswers() {
    const article = articles.find(a => a.id === currentArticleId);
    if (!article) return;
    
    let correct = 0;
    const total = article.questions.length;
    
    article.questions.forEach((q, qIndex) => {
        const options = document.querySelectorAll(`.option[data-question="${qIndex}"]`);
        options.forEach((opt, oIndex) => {
            opt.classList.remove('correct', 'wrong');
            if (oIndex === q.answer) {
                opt.classList.add('correct');
            }
            if (selectedAnswers[qIndex] === oIndex && oIndex !== q.answer) {
                opt.classList.add('wrong');
            }
        });
        
        if (selectedAnswers[qIndex] === q.answer) {
            correct++;
        }
    });
    
    const result = document.getElementById('quiz-result');
    result.classList.remove('hidden', 'success', 'partial');
    
    if (correct === total) {
        result.classList.add('success');
        result.innerHTML = `🎉 太棒了！全部答对！(${correct}/${total})`;
    } else {
        result.classList.add('partial');
        result.innerHTML = `答对了 ${correct} 题，共 ${total} 题。继续加油！`;
    }
}

// 返回主页
function goBack() {
    detailPage.classList.remove('active');
    homePage.classList.add('active');
    resetAudio();
}

// 切换标签
function switchTab(tab) {
    tabBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    
    if (tab === 'articles') {
        articlesContainer.classList.remove('hidden');
        booksContainer.classList.add('hidden');
        vocabularyContainer.classList.add('hidden');
    } else if (tab === 'books') {
        articlesContainer.classList.add('hidden');
        booksContainer.classList.remove('hidden');
        vocabularyContainer.classList.add('hidden');
    } else {
        articlesContainer.classList.add('hidden');
        booksContainer.classList.add('hidden');
        vocabularyContainer.classList.remove('hidden');
        renderVocabularyList();
    }
}

// 打开书籍
function openBook(id) {
    currentBookId = id;
    const book = books.find(b => b.id === id);
    if (!book) return;
    
    // 填充内容
    document.getElementById('book-title').textContent = book.title;
    document.getElementById('book-full-title').textContent = book.titleZh;
    document.getElementById('book-author').textContent = book.author;
    document.getElementById('book-level').textContent = book.level;
    document.getElementById('book-desc').textContent = book.description;
    document.getElementById('book-cover').textContent = book.cover;
    document.getElementById('book-cover').style.background = book.coverColor;
    
    // 渲染章节列表
    const chaptersList = document.getElementById('chapters-list');
    chaptersList.innerHTML = book.chapters.map((chapter, index) => `
        <div class="chapter-item" data-chapter="${chapter.id}">
            <span class="chapter-num">Chapter ${index + 1}</span>
            <span class="chapter-name">${chapter.title} - ${chapter.titleZh}</span>
            <span class="chapter-arrow">→</span>
        </div>
    `).join('');
    
    // 章节点击事件
    chaptersList.querySelectorAll('.chapter-item').forEach(item => {
        item.addEventListener('click', () => {
            const chapterId = parseInt(item.dataset.chapter);
            openChapter(chapterId);
        });
    });
    
    // 切换页面
    homePage.classList.remove('active');
    bookChaptersPage.classList.add('active');
    window.scrollTo(0, 0);
}

// 打开章节
function openChapter(chapterId) {
    const book = books.find(b => b.id === currentBookId);
    if (!book) return;
    
    currentChapterId = chapterId;
    const chapter = book.chapters.find(c => c.id === chapterId);
    if (!chapter) return;
    
    // 填充内容
    document.getElementById('chapter-title').textContent = `Ch.${chapter.id} ${chapter.title}`;
    document.getElementById('chapter-content').innerHTML = chapter.content;
    
    // 渲染章节单词
    renderChapterWords(chapter.words);
    
    // 更新导航按钮
    updateChapterNav();
    
    // 切换页面
    bookChaptersPage.classList.remove('active');
    chapterPage.classList.add('active');
    window.scrollTo(0, 0);
}

// 渲染章节单词
function renderChapterWords(words) {
    const wordsList = document.getElementById('chapter-words-list');
    wordsList.innerHTML = words.map(w => {
        const isAdded = vocabularyList.some(v => v.word === w.word);
        return `
            <div class="word-item">
                <div class="word-info">
                    <div>
                        <span class="word">${w.word}</span>
                        <span class="phonetic">${w.phonetic}</span>
                    </div>
                    <div class="meaning">${w.meaning}</div>
                </div>
                <button class="add-btn ${isAdded ? 'added' : ''}" data-word="${w.word}" data-phonetic="${w.phonetic}" data-meaning="${w.meaning}" data-example="${w.example || ''}">
                    ${isAdded ? '已添加' : '添加'}
                </button>
            </div>
        `;
    }).join('');
    
    // 添加单词按钮事件
    wordsList.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (!btn.classList.contains('added')) {
                const wordData = {
                    word: btn.dataset.word,
                    phonetic: btn.dataset.phonetic,
                    meaning: btn.dataset.meaning,
                    example: btn.dataset.example
                };
                addToVocabulary(wordData);
                btn.classList.add('added');
                btn.textContent = '已添加';
            }
        });
    });
}

// 更新章节导航
function updateChapterNav() {
    const book = books.find(b => b.id === currentBookId);
    if (!book) return;
    
    const chapterIndex = book.chapters.findIndex(c => c.id === currentChapterId);
    const prevBtn = document.getElementById('prev-chapter');
    const nextBtn = document.getElementById('next-chapter');
    
    prevBtn.disabled = chapterIndex <= 0;
    nextBtn.disabled = chapterIndex >= book.chapters.length - 1;
}

// 章节导航
function navigateChapter(direction) {
    const book = books.find(b => b.id === currentBookId);
    if (!book) return;
    
    const chapterIndex = book.chapters.findIndex(c => c.id === currentChapterId);
    const newIndex = chapterIndex + direction;
    
    if (newIndex >= 0 && newIndex < book.chapters.length) {
        openChapter(book.chapters[newIndex].id);
    }
}

// 显示章节单词弹窗
function showChapterWordModal(word) {
    const book = books.find(b => b.id === currentBookId);
    if (!book) return;
    
    const chapter = book.chapters.find(c => c.id === currentChapterId);
    if (!chapter) return;
    
    const wordData = chapter.words.find(w => w.word === word);
    if (!wordData) return;
    
    document.getElementById('word-detail').innerHTML = `
        <div class="word">${wordData.word}</div>
        <div class="phonetic">${wordData.phonetic}</div>
        <div class="meaning">${wordData.meaning}</div>
        <div class="example"><strong>例句：</strong>${wordData.example || ''}</div>
    `;
    
    const addBtn = document.getElementById('add-word-btn');
    const isAdded = vocabularyList.some(v => v.word === wordData.word);
    addBtn.textContent = isAdded ? '已在单词本中' : '加入单词本';
    addBtn.classList.toggle('added', isAdded);
    addBtn.dataset.word = wordData.word;
    addBtn.dataset.phonetic = wordData.phonetic;
    addBtn.dataset.meaning = wordData.meaning;
    addBtn.dataset.example = wordData.example || '';
    
    wordModal.classList.remove('hidden');
}

// 切换翻译
function toggleTranslation() {
    const btn = document.getElementById('toggle-translation');
    const content = document.getElementById('translation-content');
    
    if (content.classList.contains('hidden')) {
        content.classList.remove('hidden');
        btn.classList.add('active');
        btn.textContent = '收起中文翻译 ▲';
    } else {
        content.classList.add('hidden');
        btn.classList.remove('active');
        btn.textContent = '查看中文翻译 ▼';
    }
}

// 音频播放
function toggleAudio() {
    const btn = document.getElementById('play-btn');
    
    if (isPlaying) {
        pauseAudio();
    } else {
        playAudio();
    }
}

function playAudio() {
    isPlaying = true;
    const btn = document.getElementById('play-btn');
    btn.textContent = '⏸ 暂停';
    btn.classList.add('playing');
    
    // 模拟音频播放
    audioInterval = setInterval(() => {
        audioProgress += 0.5;
        if (audioProgress >= 100) {
            resetAudio();
            return;
        }
        updateAudioProgress();
    }, 100);
}

function pauseAudio() {
    isPlaying = false;
    const btn = document.getElementById('play-btn');
    btn.textContent = '▶ 播放音频';
    btn.classList.remove('playing');
    clearInterval(audioInterval);
}

function resetAudio() {
    pauseAudio();
    audioProgress = 0;
    updateAudioProgress();
}

function updateAudioProgress() {
    document.getElementById('audio-progress').style.width = audioProgress + '%';
    const totalSeconds = 180; // 假设3分钟
    const currentSeconds = Math.floor(totalSeconds * audioProgress / 100);
    const minutes = Math.floor(currentSeconds / 60);
    const seconds = currentSeconds % 60;
    document.getElementById('audio-time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
}

// 显示单词弹窗
function showWordModal(word) {
    const article = articles.find(a => a.id === currentArticleId);
    if (!article) return;
    
    const wordData = article.words.find(w => w.word === word);
    if (!wordData) return;
    
    document.getElementById('word-detail').innerHTML = `
        <div class="word">${wordData.word}</div>
        <div class="phonetic">${wordData.phonetic}</div>
        <div class="meaning">${wordData.meaning}</div>
        <div class="example"><strong>例句：</strong>${wordData.example}</div>
    `;
    
    const addBtn = document.getElementById('add-word-btn');
    const isAdded = vocabularyList.some(v => v.word === wordData.word);
    addBtn.textContent = isAdded ? '已在单词本中' : '加入单词本';
    addBtn.classList.toggle('added', isAdded);
    addBtn.dataset.word = wordData.word;
    addBtn.dataset.phonetic = wordData.phonetic;
    addBtn.dataset.meaning = wordData.meaning;
    
    wordModal.classList.remove('hidden');
}

// 从弹窗添加单词
function addWordFromModal() {
    const btn = document.getElementById('add-word-btn');
    if (btn.classList.contains('added')) return;
    
    const wordData = {
        word: btn.dataset.word,
        phonetic: btn.dataset.phonetic,
        meaning: btn.dataset.meaning
    };
    
    addToVocabulary(wordData);
    btn.textContent = '已添加';
    btn.classList.add('added');
    
    // 更新单词列表中的按钮状态
    const wordBtn = document.querySelector(`.word-item .add-btn[data-word="${wordData.word}"]`);
    if (wordBtn) {
        wordBtn.classList.add('added');
        wordBtn.textContent = '已添加';
    }
}

// 添加到单词本
function addToVocabulary(wordData) {
    if (vocabularyList.some(v => v.word === wordData.word)) return;
    
    vocabularyList.push(wordData);
    localStorage.setItem('vocabulary', JSON.stringify(vocabularyList));
    showToast('已添加到单词本');
}

// 从单词本移除
function removeFromVocabulary(word) {
    vocabularyList = vocabularyList.filter(v => v.word !== word);
    localStorage.setItem('vocabulary', JSON.stringify(vocabularyList));
    renderVocabularyList();
    showToast('已从单词本移除');
}

// 显示提示
function showToast(message) {
    toast.textContent = message;
    toast.classList.remove('hidden');
    setTimeout(() => {
        toast.classList.add('hidden');
    }, 2000);
}

// 启动应用
init();
    </script>
