<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日英语阅读</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
/* 基础样式重置 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    /* 暖色调配色 */
    --primary-color: #E8A87C;
    --primary-dark: #D4956A;
    --secondary-color: #C38D9E;
    --accent-color: #41B3A3;
    --background-color: #FFF8F0;
    --card-bg: #FFFFFF;
    --text-primary: #4A4A4A;
    --text-secondary: #7A7A7A;
    --text-light: #A0A0A0;
    --border-color: #F0E6DA;
    --success-color: #7CB342;
    --error-color: #E57373;
    --shadow: 0 2px 12px rgba(232, 168, 124, 0.15);
}

body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: var(--background-color);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
}

#app {
    max-width: 100%;
    min-height: 100vh;
}

/* 页面切换 */
.page {
    display: none;
    min-height: 100vh;
    padding-bottom: 20px;
}

.page.active {
    display: block;
}

/* 头部样式 */
.header {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    padding: 30px 20px 25px;
    text-align: center;
    border-radius: 0 0 30px 30px;
    box-shadow: var(--shadow);
}

.header h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 5px;
}

.header .subtitle {
    font-size: 15px;
    opacity: 0.9;
}

.detail-header {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    gap: 15px;
}

.detail-header h1 {
    font-size: 18px;
    flex: 1;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.back-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
}

.back-btn:active {
    background: rgba(255, 255, 255, 0.3);
}

/* 标签栏 */
.tab-bar {
    display: flex;
    background: var(--card-bg);
    margin: -15px 20px 15px;
    border-radius: 25px;
    padding: 5px;
    box-shadow: var(--shadow);
}

.tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 500;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.tab-btn.active {
    background: var(--primary-color);
    color: white;
}

/* 容器 */
.container {
    padding: 0 20px;
}

.hidden {
    display: none !important;
}

/* 文章列表 */
.articles-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.article-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.article-card:active {
    transform: scale(0.98);
    box-shadow: 0 1px 8px rgba(232, 168, 124, 0.2);
}

.article-card .category-tag {
    display: inline-block;
    background: var(--primary-color);
    color: white;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.article-card h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-primary);
    line-height: 1.4;
}

.article-card .preview {
    font-size: 13px;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
}

.article-card .meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-light);
}

/* 文章详情页 */
.article-meta {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    font-size: 13px;
}

.article-meta .category {
    background: var(--primary-color);
    color: white;
    padding: 3px 12px;
    border-radius: 12px;
}

.article-meta .date {
    color: var(--text-light);
    padding: 3px 0;
}

/* 音频播放器 */
.audio-player {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
}

.play-btn {
    background: var(--primary-color);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.3s ease;
}

.play-btn:active {
    background: var(--primary-dark);
}

.play-btn.playing {
    background: var(--secondary-color);
}

.progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border-color);
    border-radius: 3px;
    overflow: hidden;
}

.progress {
    height: 100%;
    background: var(--primary-color);
    width: 0%;
    transition: width 0.1s linear;
}

.audio-player .time {
    font-size: 12px;
    color: var(--text-light);
    min-width: 40px;
}

/* 文章内容 */
.article-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    font-size: 18px;
    line-height: 1.8;
}

.article-content p {
    margin-bottom: 15px;
}

.article-content p:last-child {
    margin-bottom: 0;
}

.article-content .highlight-word {
    color: var(--primary-dark);
    font-weight: 500;
    cursor: pointer;
    border-bottom: 1px dashed var(--primary-color);
}

/* 翻译区域 */
.translation-section {
    margin-bottom: 20px;
}

.toggle-btn {
    width: 100%;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    color: var(--text-primary);
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.toggle-btn:active {
    background: var(--border-color);
}

.toggle-btn.active {
    border-color: var(--primary-color);
    color: var(--primary-dark);
}

.translation-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-top: 15px;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-secondary);
    box-shadow: var(--shadow);
}

/* 区块样式 */
.section {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
}

.section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 15px;
    color: var(--text-primary);
}

/* 单词列表 */
.words-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.word-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    background: var(--background-color);
    border-radius: 12px;
}

.word-item .word-info {
    flex: 1;
}

.word-item .word {
    font-size: 16px;
    font-weight: 600;
    color: var(--primary-dark);
    cursor: pointer;
}

.word-item .word:hover {
    text-decoration: underline;
}

.word-item .phonetic {
    font-size: 12px;
    color: var(--text-light);
    margin-left: 8px;
}

.word-item .meaning {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
}

.word-item .play-word-btn {
    background: transparent;
    border: none;
    color: var(--accent-color);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    margin-right: 8px;
    transition: transform 0.2s;
}

.word-item .play-word-btn:active {
    transform: scale(1.2);
}

.word-item .play-word-btn.playing {
    color: var(--primary-color);
    animation: pulse 0.5s infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

.word-item .add-btn {
    background: transparent;
    border: 1px solid var(--primary-color);
    color: var(--primary-color);
    padding: 6px 12px;
    border-radius: 15px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.word-item .add-btn:active {
    background: var(--primary-color);
    color: white;
}

.word-item .add-btn.added {
    background: var(--success-color);
    border-color: var(--success-color);
    color: white;
}

/* 句型列表 */
.sentences-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.sentence-item {
    padding: 15px;
    background: var(--background-color);
    border-radius: 12px;
}

.sentence-item .english {
    font-size: 15px;
    color: var(--text-primary);
    margin-bottom: 8px;
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 8px;
}

.sentence-item .english-text {
    flex: 1;
}

.sentence-item .play-sentence-btn {
    background: transparent;
    border: none;
    color: var(--accent-color);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    transition: transform 0.2s;
    flex-shrink: 0;
}

.sentence-item .play-sentence-btn:active {
    transform: scale(1.2);
}

.sentence-item .play-sentence-btn.playing {
    color: var(--primary-color);
    animation: pulse 0.5s infinite;
}

.sentence-item .chinese {
    font-size: 13px;
    color: var(--text-secondary);
}

.sentence-item .explanation {
    font-size: 12px;
    color: var(--accent-color);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border-color);
}

/* 题目列表 */
.questions-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.question-item {
    padding: 15px;
    background: var(--background-color);
    border-radius: 12px;
}

.question-item .question-text {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
}

.question-item .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.question-item .option {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    background: var(--card-bg);
    border: 2px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.question-item .option:active {
    background: var(--border-color);
}

.question-item .option.selected {
    border-color: var(--primary-color);
    background: rgba(232, 168, 124, 0.1);
}

.question-item .option.correct {
    border-color: var(--success-color);
    background: rgba(124, 179, 66, 0.1);
}

.question-item .option.wrong {
    border-color: var(--error-color);
    background: rgba(229, 115, 115, 0.1);
}

.question-item .option-label {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 24px;
    height: 24px;
    background: var(--border-color);
    border-radius: 50%;
    font-size: 12px;
    font-weight: 600;
    margin-right: 10px;
}

.option.selected .option-label {
    background: var(--primary-color);
    color: white;
}

.option.correct .option-label {
    background: var(--success-color);
    color: white;
}

.option.wrong .option-label {
    background: var(--error-color);
    color: white;
}

.submit-btn {
    width: 100%;
    background: var(--primary-color);
    border: none;
    color: white;
    padding: 14px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.3s ease;
}

.submit-btn:active {
    background: var(--primary-dark);
}

.result {
    text-align: center;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    font-size: 15px;
}

.result.success {
    background: rgba(124, 179, 66, 0.1);
    color: var(--success-color);
}

.result.partial {
    background: rgba(232, 168, 124, 0.1);
    color: var(--primary-dark);
}

/* 单词本 */
.vocabulary-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.vocabulary-item {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 15px;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.vocabulary-item .word-info {
    flex: 1;
}

.vocabulary-item .word {
    font-size: 18px;
    font-weight: 600;
    color: var(--primary-dark);
    cursor: pointer;
}

.vocabulary-item .word:hover {
    text-decoration: underline;
}

.vocabulary-item .phonetic {
    font-size: 12px;
    color: var(--text-light);
    margin-left: 8px;
}

.vocabulary-item .meaning {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 4px;
}

.vocabulary-item .play-word-btn {
    background: transparent;
    border: none;
    color: var(--accent-color);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    margin-right: 8px;
    transition: transform 0.2s;
}

.vocabulary-item .play-word-btn:active {
    transform: scale(1.2);
}

.vocabulary-item .play-word-btn.playing {
    color: var(--primary-color);
    animation: pulse 0.5s infinite;
}

.vocabulary-item .delete-btn {
    background: transparent;
    border: none;
    color: var(--error-color);
    font-size: 20px;
    cursor: pointer;
    padding: 5px 10px;
}

.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
}

.empty-state .icon {
    font-size: 50px;
    margin-bottom: 15px;
}

.empty-state p {
    font-size: 14px;
}

/* 弹窗 */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 20px;
}

.modal-content {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 25px;
    width: 100%;
    max-width: 350px;
    position: relative;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: transparent;
    border: none;
    font-size: 24px;
    color: var(--text-light);
    cursor: pointer;
}

.word-detail .word {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 5px;
}

.word-detail .phonetic {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 15px;
}

.word-detail .meaning {
    font-size: 16px;
    color: var(--text-primary);
    margin-bottom: 15px;
    line-height: 1.6;
}

.word-detail .example {
    background: var(--background-color);
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 15px;
}

.word-detail .example strong {
    color: var(--primary-dark);
}

.add-word-btn {
    width: 100%;
    background: var(--primary-color);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 20px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.3s ease;
}

.add-word-btn:active {
    background: var(--primary-dark);
}

.add-word-btn.added {
    background: var(--success-color);
}

/* 提示消息 */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.8);
    color: white;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 14px;
    z-index: 1001;
    transition: opacity 0.3s ease;
}

/* 响应式调整 */
@media (min-width: 768px) {
    .header {
        padding: 40px 20px 35px;
    }
    
    .header h1 {
        font-size: 28px;
    }
    
    .container {
        max-width: 600px;
        margin: 0 auto;
    }
    
    .article-content {
        font-size: 17px;
    }
}

/* 动画 */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.article-card, .vocabulary-item {
    animation: fadeIn 0.3s ease;
}

/* 获取新文章按钮 */
.refresh-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
    border: none;
    color: white;
    padding: 14px 20px;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
}

.refresh-btn:active {
    transform: scale(0.98);
}

.refresh-btn .refresh-icon {
    font-size: 18px;
}

.refresh-btn.loading .refresh-icon {
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* 书籍列表 */
.books-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.book-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    gap: 15px;
}

.book-card:active {
    transform: scale(0.98);
}

.book-card .cover {
    width: 70px;
    height: 95px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
}

.book-card .info {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.book-card h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--text-primary);
    line-height: 1.3;
}

.book-card .author {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 6px;
}

.book-card .level {
    display: inline-block;
    background: var(--border-color);
    color: var(--text-secondary);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    width: fit-content;
}

.book-card .desc {
    font-size: 12px;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
}

/* 书籍详情页 */
.book-info-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 15px;
}

.book-info-card .book-cover {
    width: 80px;
    height: 110px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
}

.book-meta-info {
    flex: 1;
}

.book-meta-info h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--text-primary);
}

.book-meta-info .book-author {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 8px;
}

.book-meta-info .book-level {
    display: inline-block;
    background: var(--primary-color);
    color: white;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 8px;
}

.book-meta-info .book-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
}

/* 章节列表 */
.chapters-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.chapter-item {
    background: var(--background-color);
    padding: 14px 16px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.2s ease;
}

.chapter-item:active {
    background: var(--border-color);
}

.chapter-item .chapter-num {
    font-size: 12px;
    color: var(--text-light);
    margin-right: 10px;
}

.chapter-item .chapter-name {
    flex: 1;
    font-size: 14px;
    color: var(--text-primary);
}

.chapter-item .chapter-arrow {
    color: var(--text-light);
    font-size: 14px;
}

/* 章节内容 */
.chapter-content {
    background: var(--card-bg);
    border-radius: 16px;

// 从localStorage加载新文章状态
function loadNewArticlesStatus() {
    const saved = localStorage.getItem('newArticlesAdded');
    if (saved === 'true') {
        newArticlesAdded = true;
        // 恢复新文章到文章列表
        newArticlesPool.forEach(article => {
            const exists = articles.some(a => a.id === article.id);
            if (!exists) {
                article.isNew = true;
                articles.unshift(article);
            }
        });
    }
}

// 保存新文章状态
function saveNewArticlesStatus() {
    localStorage.setItem('newArticlesAdded', 'true');
}

// 检查是否需要自动推送新文章（每天一次）
function checkDailyArticle() {
    const lastCheck = localStorage.getItem('lastArticleCheck');
    const today = new Date().toDateString();
    
    if (lastCheck !== today) {
        // 新的一天，自动推送一篇文章
        localStorage.setItem('lastArticleCheck', today);
        
        // 找到未添加的文章
        const unaddedArticles = newArticlesPool.filter(poolArticle => {
            return !articles.some(a => a.id === poolArticle.id);
        });
        
        if (unaddedArticles.length > 0) {
            // 添加第一篇未添加的文章
            const articleToAdd = unaddedArticles[0];
            articleToAdd.isNew = true;
            articles.unshift(articleToAdd);
            saveNewArticlesStatus();
            renderArticlesList();
            showToast('今日新文章已推送！');
        }
    }
}

// 渲染文章列表
function renderArticlesList() {
    articlesList.innerHTML = articles.map((article, index) => `
        <div class="article-card" data-id="${article.id}" style="animation-delay: ${index * 0.1}s">
            <span class="category-tag">${article.category}</span>
            ${article.isNew ? '<span class="new-article-badge">NEW</span>' : ''}
            <h3>${article.title}</h3>
            <p class="preview">${getPreview(article.content)}</p>
            <div class="meta">
                <span>${article.date}</span>
                <span>${article.words.length} 个重点单词</span>
            </div>
        </div>
    `).join('');
}

// 渲染书籍列表
function renderBooksList() {
    booksList.innerHTML = books.map((book, index) => `
        <div class="book-card" data-id="${book.id}" style="animation-delay: ${index * 0.1}s">
            <div class="cover" style="background: ${book.coverColor}">${book.cover}</div>
            <div class="info">
                <h3>${book.title}</h3>
                <h3 style="font-size: 14px; font-weight: 400; margin-bottom: 5px;">${book.titleZh}</h3>
                <p class="author">${book.author}</p>
                <span class="level">${book.level}</span>
                <p class="desc">${book.description}</p>
            </div>
        </div>
    `).join('');
}

// 获取新文章
function fetchNewArticles() {
    const btn = document.getElementById('refresh-articles');
    btn.classList.add('loading');
    btn.disabled = true;
    
    // 模拟加载
    setTimeout(() => {
        // 检查是否已经添加过
        if (!newArticlesAdded) {
            // 添加新文章到列表开头
            newArticlesPool.forEach(article => {
                const exists = articles.some(a => a.id === article.id);
                if (!exists) {
                    article.isNew = true;
                    articles.unshift(article);
                }
            });
            newArticlesAdded = true;
            saveNewArticlesStatus(); // 保存状态到localStorage
        }
        
        renderArticlesList();
        btn.classList.remove('loading');
        btn.disabled = false;
        showToast('已获取 ' + newArticlesPool.length + ' 篇新文章！');
    }, 1500);
}

// 获取文章预览
function getPreview(content) {
    const temp = document.createElement('div');
    temp.innerHTML = content;
    const text = temp.textContent || temp.innerText;
    return text.substring(0, 80) + '...';
}

    // 每次渲染前重新加载最新数据

            // 移除同题其他选项的选中状态
            questionsList.querySelectorAll(`.option[data-question="${qIndex}"]`).forEach(o => {
                o.classList.remove('selected');
            });

            opt.classList.add('selected');

// 提交答案
function submitAnswers() {
    const article = articles.find(a => a.id === currentArticleId);
    if (!article) return;
    
    let correct = 0;
    const total = article.questions.length;
    
    article.questions.forEach((q, qIndex) => {
        const options = document.querySelectorAll(`.option[data-question="${qIndex}"]`);
        options.forEach((opt, oIndex) => {
            opt.classList.remove('correct', 'wrong');
            if (oIndex === q.answer) {
                opt.classList.add('correct');
            }
            if (selectedAnswers[qIndex] === oIndex && oIndex !== q.answer) {
                opt.classList.add('wrong');
            }
        });
        
        if (selectedAnswers[qIndex] === q.answer) {
            correct++;
        }
    });
    
    const result = document.getElementById('quiz-result');
    result.classList.remove('hidden', 'success', 'partial');
    
    if (correct === total) {
        result.classList.add('success');
        result.innerHTML = `🎉 太棒了！全部答对！(${correct}/${total})`;
    } else {
        result.classList.add('partial');
        result.innerHTML = `答对了 ${correct} 题，共 ${total} 题。继续加油！`;
    }
}

// 音频播放 - 使用 Web Speech API
let speechSynthesis = window.speechSynthesis;
let currentUtterance = null;
let totalCharCount = 0;
let startCharIndex = 0;

function toggleAudio() {
    if (speechSynthesis && speechSynthesis.paused) {
        // 当前是暂停状态，继续播放
        resumeAudio();
    } else if (isPlaying) {
        // 当前正在播放，暂停
        pauseAudio();
    } else {
        // 当前没有播放，开始播放
        playAudio();
    }
}

function playAudio() {
    const article = articles.find(a => a.id === currentArticleId);
    if (!article) return;
    
    // 获取文章纯文本内容（去除HTML标签）
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = article.content;
    const textContent = tempDiv.textContent || tempDiv.innerText;
    
    // 检查浏览器是否支持语音合成
    if (!speechSynthesis) {
        alert('您的浏览器不支持语音播放功能');
        return;
    }
    
    // 取消之前的播放
    speechSynthesis.cancel();
    
    // 创建语音
    currentUtterance = new SpeechSynthesisUtterance(textContent);
    currentUtterance.lang = 'en-US';
    currentUtterance.rate = 0.9; // 稍慢一点，适合学习
    currentUtterance.pitch = 1;
    currentUtterance.volume = 1;
    
    // 尝试选择英语女声
    const voices = speechSynthesis.getVoices();
    const englishVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female')) ||
                         voices.find(v => v.lang.startsWith('en'));
    if (englishVoice) {
        currentUtterance.voice = englishVoice;
    }
    
    totalCharCount = textContent.length;
    startCharIndex = 0;
    
    // 更新按钮状态
    isPlaying = true;
    const btn = document.getElementById('play-btn');
    btn.textContent = '⏸ 暂停';
    btn.classList.add('playing');
    
    // 监听播放进度
    currentUtterance.onboundary = function(event) {
        if (event.name === 'word') {
            const progress = (event.charIndex / totalCharCount) * 100;
            audioProgress = progress;
            updateAudioProgress();
        }
    };
    
    currentUtterance.onend = function() {
        resetAudio();
    };
    
    currentUtterance.onerror = function(event) {
        console.error('Speech error:', event.error);
        if (event.error !== 'interrupted' && event.error !== 'canceled') {
            resetAudio();
        }
    };
    
    // 开始播放
    speechSynthesis.speak(currentUtterance);
    
    // 启动进度更新定时器（作为备用，因为 onboundary 不是所有浏览器都支持）
    audioInterval = setInterval(() => {
        if (isPlaying && speechSynthesis.speaking && !speechSynthesis.paused) {
            audioProgress += 0.3;
            if (audioProgress >= 100) {
                audioProgress = 100;
            }
            updateAudioProgress();
        }
    }, 100);
}

function pauseAudio() {
    if (speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        isPlaying = false;
        const btn = document.getElementById('play-btn');
        btn.textContent = '▶ 继续播放';
        btn.classList.remove('playing');
        clearInterval(audioInterval);
    }
}

function resumeAudio() {
    if (speechSynthesis.paused) {
        speechSynthesis.resume();
        isPlaying = true;
        const btn = document.getElementById('play-btn');
        btn.textContent = '⏸ 暂停';
        btn.classList.add('playing');
        
        audioInterval = setInterval(() => {
            if (isPlaying && speechSynthesis.speaking && !speechSynthesis.paused) {
                audioProgress += 0.3;
                if (audioProgress >= 100) {
                    audioProgress = 100;
                }
                updateAudioProgress();
            }
        }, 100);
    }
}

function resetAudio() {
    speechSynthesis.cancel();
    isPlaying = false;
    audioProgress = 0;
    const btn = document.getElementById('play-btn');
    btn.textContent = '▶ 播放音频';
    btn.classList.remove('playing');
    clearInterval(audioInterval);
    updateAudioProgress();
}

function updateAudioProgress() {
    document.getElementById('audio-progress').style.width = audioProgress + '%';
    const totalSeconds = 180; // 假设3分钟
    const currentSeconds = Math.floor(totalSeconds * audioProgress / 100);
    const minutes = Math.floor(currentSeconds / 60);
    const seconds = currentSeconds % 60;
    document.getElementById('audio-time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
}

// 播放单词发音
function playWord(word, element) {
    if (!speechSynthesis) {
        return;
    }
    
    // 取消之前的播放
    speechSynthesis.cancel();
    
    // 移除其他元素的播放状态
    document.querySelectorAll('.play-word-btn.playing, .word.playing').forEach(el => {
        el.classList.remove('playing');
    });
    
    // 添加播放状态
    if (element) {
        element.classList.add('playing');
    }
    
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'en-US';
    utterance.rate = 0.8; // 稍慢，方便听清
    utterance.pitch = 1;
    
    // 尝试选择英语声音
    const voices = speechSynthesis.getVoices();
    const englishVoice = voices.find(v => v.lang.startsWith('en'));
    if (englishVoice) {
        utterance.voice = englishVoice;
    }
    
    utterance.onend = function() {
        if (element) {
            element.classList.remove('playing');
        }
    };
    
    utterance.onerror = function() {
        if (element) {
            element.classList.remove('playing');
        }
    };
    
    speechSynthesis.speak(utterance);
}

// 播放句子发音
function playSentence(sentence, element) {

// 章节音频播放
let chapterUtterance = null;

function toggleChapterAudio() {
    if (speechSynthesis && speechSynthesis.paused) {
        resumeChapterAudio();
    } else if (isChapterPlaying) {
        pauseChapterAudio();
    } else {
        playChapterAudio();
    }
}

function playChapterAudio() {
    const book = books.find(b => b.id === currentBookId);
    if (!book) return;
    const chapter = book.chapters.find(c => c.id === currentChapterId);
    if (!chapter) return;
    
    // 获取章节纯文本内容
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = chapter.content;
    const textContent = tempDiv.textContent || tempDiv.innerText;
    
    if (!speechSynthesis) {
        alert('您的浏览器不支持语音播放功能');
        return;
    }
    
    speechSynthesis.cancel();
    
    chapterUtterance = new SpeechSynthesisUtterance(textContent);
    chapterUtterance.lang = 'en-US';
    chapterUtterance.rate = 0.9;
    chapterUtterance.pitch = 1;
    chapterUtterance.volume = 1;
    
    const voices = speechSynthesis.getVoices();
    const englishVoice = voices.find(v => v.lang.startsWith('en'));
    if (englishVoice) {
        chapterUtterance.voice = englishVoice;
    }
    
    isChapterPlaying = true;
    const btn = document.getElementById('chapter-play-btn');
    btn.textContent = '⏸ 暂停';
    btn.classList.add('playing');
    
    const totalChars = textContent.length;
    
    chapterUtterance.onend = function() {
        resetChapterAudio();
    };
    
    chapterUtterance.onerror = function(event) {
        if (event.error !== 'interrupted' && event.error !== 'canceled') {
            resetChapterAudio();
        }
    };
    
    speechSynthesis.speak(chapterUtterance);
    
    chapterAudioInterval = setInterval(() => {
        if (isChapterPlaying && speechSynthesis.speaking && !speechSynthesis.paused) {
            chapterAudioProgress += 0.2;
            if (chapterAudioProgress >= 100) {
                chapterAudioProgress = 100;
            }
            updateChapterAudioProgress();
        }
    }, 100);
}

function pauseChapterAudio() {
    if (speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        isChapterPlaying = false;
        const btn = document.getElementById('chapter-play-btn');
        btn.textContent = '▶ 继续播放';
        btn.classList.remove('playing');
        clearInterval(chapterAudioInterval);
    }
}

function resumeChapterAudio() {
    if (speechSynthesis.paused) {
        speechSynthesis.resume();
        isChapterPlaying = true;
        const btn = document.getElementById('chapter-play-btn');
        btn.textContent = '⏸ 暂停';
        btn.classList.add('playing');
        
        chapterAudioInterval = setInterval(() => {
            if (isChapterPlaying && speechSynthesis.speaking && !speechSynthesis.paused) {
                chapterAudioProgress += 0.2;
                if (chapterAudioProgress >= 100) {
                    chapterAudioProgress = 100;
                }
                updateChapterAudioProgress();
            }
        }, 100);
    }
}

function resetChapterAudio() {
    speechSynthesis.cancel();
    isChapterPlaying = false;
    chapterAudioProgress = 0;
    const btn = document.getElementById('chapter-play-btn');
    if (btn) {
        btn.textContent = '▶ 播放音频';
        btn.classList.remove('playing');
    }
    clearInterval(chapterAudioInterval);
    updateChapterAudioProgress();
}

function updateChapterAudioProgress() {
    const progressBar = document.getElementById('chapter-audio-progress');
    const timeDisplay = document.getElementById('chapter-audio-time');
    if (progressBar) {
        progressBar.style.width = chapterAudioProgress + '%';
    }
    if (timeDisplay) {
        const totalSeconds = 120;
        const currentSeconds = Math.floor(totalSeconds * chapterAudioProgress / 100);
        const minutes = Math.floor(currentSeconds / 60);
        const seconds = currentSeconds % 60;
        timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
}

// 预加载语音列表（某些浏览器需要）
if (speechSynthesis) {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = function() {
        speechSynthesis.getVoices();
    };
}

// 显示单词弹窗
function showWordModal(word) {
    const article = articles.find(a => a.id === currentArticleId);
    if (!article) return;
    
    const wordData = article.words.find(w => w.word === word);
    if (!wordData) return;
    
    document.getElementById('word-detail').innerHTML = `
        <div class="word">${wordData.word}</div>
        <div class="phonetic">${wordData.phonetic}</div>
        <div class="meaning">${wordData.meaning}</div>
        <div class="example"><strong>例句：</strong>${wordData.example}</div>
    `;
    
    const addBtn = document.getElementById('add-word-btn');
    const isAdded = vocabularyList.some(v => v.word === wordData.word);
    addBtn.textContent = isAdded ? '已在单词本中' : '加入单词本';
    addBtn.classList.toggle('added', isAdded);
    addBtn.dataset.word = wordData.word;
    addBtn.dataset.phonetic = wordData.phonetic;
    addBtn.dataset.meaning = wordData.meaning;
    
    wordModal.classList.remove('hidden');
}

// 从弹窗添加单词
function addWordFromModal() {
    const btn = document.getElementById('add-word-btn');
    if (btn.classList.contains('added')) return;
    
    const wordData = {
        word: btn.dataset.word,
        phonetic: btn.dataset.phonetic,
        meaning: btn.dataset.meaning
    };
    
    addToVocabulary(wordData);
    btn.textContent = '已添加';
    btn.classList.add('added');
    
    // 更新单词列表中的按钮状态
    const wordBtn = document.querySelector(`.word-item .add-btn[data-word="${wordData.word}"]`);
    if (wordBtn) {
        wordBtn.classList.add('added');
        wordBtn.textContent = '已添加';
    }
}

// 保存单词本到 localStorage（带错误处理）
function saveVocabulary() {
    try {
        localStorage.setItem('vocabulary', JSON.stringify(vocabularyList));
        // 验证保存成功
        const saved = localStorage.getItem('vocabulary');
        if (!saved) {
            console.error('Failed to save vocabulary: localStorage returned null');
            showToast('保存失败，请检查浏览器设置');
            return false;
        }
        return true;
    } catch (e) {
        console.error('Error saving vocabulary:', e);
        showToast('保存失败：' + e.message);
        return false;
    }
}

// 从 localStorage 加载单词本（带错误处理）
function loadVocabulary() {
    try {
        const saved = localStorage.getItem('vocabulary');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) {
                return parsed;
            }
        }
    } catch (e) {
        console.error('Error loading vocabulary:', e);
    }
    return [];
}

// 添加到单词本
function addToVocabulary(wordData) {
    // 重新加载确保数据最新
    vocabularyList = loadVocabulary();
    
    if (vocabularyList.some(v => v.word === wordData.word)) {
        showToast('单词已在单词本中');
        return;
    }
    
    // 添加时间戳
    wordData.addedAt = new Date().toISOString();
    
    vocabularyList.push(wordData);
    
    if (saveVocabulary()) {
        showToast('已添加到单词本');
        // 如果当前在单词本页面，刷新显示
        if (document.getElementById('vocabulary-page').classList.contains('active')) {
            renderVocabularyList();
        }
    }
}

// 从单词本移除
function removeFromVocabulary(word) {
    // 重新加载确保数据最新
    vocabularyList = loadVocabulary();
    
    vocabularyList = vocabularyList.filter(v => v.word !== word);
    
    if (saveVocabulary()) {
        renderVocabularyList();
        showToast('已从单词本移除');
    }
}

// 检查 localStorage 是否可用
function checkLocalStorage() {
    try {
        const test = '__test__';
        localStorage.setItem(test, test);
        localStorage.removeItem(test);
        return true;
    } catch (e) {
        console.error('localStorage is not available:', e);
        showToast('警告：浏览器存储不可用，单词本数据可能无法保存');
        return false;
    }
}

// 显示提示
function showToast(message) {
    toast.textContent = message;
    toast.classList.remove('hidden');
    setTimeout(() => {
        toast.classList.add('hidden');
    }, 2000);
}

// ========== 绘本阅读功能 ==========

// 渲染绘本列表
function renderPicturebooksList() {
    // 按级别分组
    const levels = [6, 7, 8, 9];
    let html = '';
    
    levels.forEach(level => {
        const booksInLevel = picturebooks.filter(book => book.level === level);
        if (booksInLevel.length > 0) {
            html += `<div class="level-section">
                <h3 class="level-section-title">
                    <span class="level-num">Level ${level}</span>
                    ${getLevelName(level)}
                </h3>`;
            
            booksInLevel.forEach((book, index) => {
                html += `
                <div class="picturebook-card" data-id="${book.id}" style="animation-delay: ${index * 0.1}s">
                    <div class="book-cover-placeholder">${book.coverEmoji}</div>
                    <div class="book-info">
                        <h3>${book.title}</h3>
                        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 5px;">${book.titleZh}</p>
                        <span class="level-badge">${book.levelDesc}</span>
                        <p class="book-desc">${book.description}</p>
                    </div>
                </div>`;
            });
            
            html += `</div>`;
        }
    });
    
    picturebooksList.innerHTML = html;
}

// 获取级别名称
function getLevelName(level) {
    const names = {
        6: '初级进阶',
        7: '中级入门',
        8: '中级进阶',
        9: '高级入门'
    };
    return names[level] || '';
}

// 打开绘本阅读
function openPicturebook(id) {
    currentPicturebook = picturebooks.find(book => book.id === id);
    if (!currentPicturebook) return;
    
    currentPageIndex = 0;
    
    // 设置绘本信息
    document.getElementById('picturebook-title').textContent = currentPicturebook.title;
    document.getElementById('pb-book-title').textContent = currentPicturebook.title;
    document.getElementById('pb-book-meta').textContent = `${currentPicturebook.titleZh} | ${currentPicturebook.levelDesc}`;
    document.getElementById('pb-book-desc').textContent = currentPicturebook.description;
    
    // 渲染缩略图
    renderPageThumbnails();
    
    // 渲染第一页
    renderPicturebookPage();
    
    // 显示绘本阅读页
    homePage.classList.remove('active');
    picturebookReaderPage.classList.add('active');
}

// 渲染页面缩略图
function renderPageThumbnails() {
    const container = document.getElementById('page-thumbnails');
    container.innerHTML = currentPicturebook.pages.map((page, index) => `
        <div class="thumbnail ${index === currentPageIndex ? 'active' : ''}" data-page="${index}">
            ${page.imageEmoji}
        </div>
    `).join('');
    
    // 添加缩略图点击事件
    container.querySelectorAll('.thumbnail').forEach(thumb => {
        thumb.addEventListener('click', () => {
            currentPageIndex = parseInt(thumb.dataset.page);
            renderPicturebookPage();
            updateThumbnailActive();
        });
    });
}

// 更新缩略图选中状态
function updateThumbnailActive() {
    document.querySelectorAll('#page-thumbnails .thumbnail').forEach((thumb, index) => {
        thumb.classList.toggle('active', index === currentPageIndex);
    });
    
    // 滚动到当前缩略图
    const activeThumb = document.querySelector('#page-thumbnails .thumbnail.active');
    if (activeThumb) {
        activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
}

// 渲染绘本页面
function renderPicturebookPage() {
    const page = currentPicturebook.pages[currentPageIndex];
    const totalPages = currentPicturebook.pages.length;
    
    // 更新页面指示器
    document.getElementById('page-indicator').textContent = `${currentPageIndex + 1} / ${totalPages}`;
    
    // 更新翻页按钮状态
    document.getElementById('prev-page').disabled = currentPageIndex === 0;
    document.getElementById('next-page').disabled = currentPageIndex === totalPages - 1;
    
    // 渲染图片（使用emoji占位）
    const imageEl = document.getElementById('pb-page-image');
    const placeholderEl = document.getElementById('pb-page-placeholder');
    imageEl.classList.add('hidden');
    placeholderEl.classList.remove('hidden');
    placeholderEl.textContent = page.imageEmoji;
    
    // 渲染英文文字
    document.getElementById('pb-page-text').innerHTML = page.text;
    
    // 渲染中文翻译
    document.getElementById('pb-page-translation').innerHTML = page.translation;
    
    // 重置翻译显示状态
    document.getElementById('pb-page-translation').classList.add('hidden');
    document.getElementById('toggle-pb-translation').textContent = '查看中文翻译 ▼';
    
    // 渲染重点单词
    renderPicturebookWords(page.words);
    
    // 更新缩略图选中状态
    updateThumbnailActive();
}

// 渲染绘本单词
function renderPicturebookWords(words) {
    const container = document.getElementById('pb-words-list');
    if (!words || words.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary); font-size: 14px; padding: 10px 0;">本页没有重点单词</p>';
        return;
    }
    
    container.innerHTML = words.map(word => `
        <div class="word-card" data-word="${word.word}">
            <div class="word-header">
                <span class="word-text">${word.word}</span>
                <span class="phonetic">${word.phonetic}</span>
                <button class="play-word-btn" data-word="${word.word}">🔊</button>
            </div>
            <div class="meaning">${word.meaning}</div>
            <div class="example">${word.example}</div>
            <button class="add-word-btn-small" data-word='${JSON.stringify(word).replace(/'/g, "&#39;")}'>+ 加入单词本</button>
        </div>
    `).join('');
    
    // 添加单词事件
    container.querySelectorAll('.word-card').forEach(card => {
        card.addEventListener('click', (e) => {
            if (!e.target.classList.contains('play-word-btn') && !e.target.classList.contains('add-word-btn-small')) {
                showWordDetail(card.dataset.word);
            }
        });
    });
    
    container.querySelectorAll('.play-word-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            playWord(btn.dataset.word, btn);
        });
    });
    
    container.querySelectorAll('.add-word-btn-small').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const wordData = JSON.parse(btn.dataset.word);
            addToVocabulary(wordData);
        });
    });
}

// 绘本翻页
function navigatePicturebookPage(direction) {
    const totalPages = currentPicturebook.pages.length;
    const newIndex = currentPageIndex + direction;
    
    if (newIndex >= 0 && newIndex < totalPages) {
        currentPageIndex = newIndex;
        renderPicturebookPage();
    }
}

// 切换绘本翻译显示
function togglePicturebookTranslation() {
    const content = document.getElementById('pb-page-translation');
    const btn = document.getElementById('toggle-pb-translation');
    
    if (content.classList.contains('hidden')) {
        content.classList.remove('hidden');
        btn.textContent = '收起中文翻译 ▲';
    } else {
        content.classList.add('hidden');
        btn.textContent = '查看中文翻译 ▼';
    }
}
